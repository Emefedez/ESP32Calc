; ESP32Calc — MicroPython Project
; ================================
; Python files are frozen into MicroPython by tools/build_frozen_docker.sh.
; PlatformIO builds a small placeholder first, then tools/pio_micro_build.py
; replaces it with build/frozen/firmware.bin.
;
; PlatformIO is used here for project organisation, serial monitor,
; and as a reference for board/flash settings.

[platformio]
default_envs = esp32-s3-wokwi
src_dir = tools/pio_stub

[env]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino
board_build.mcu = esp32s3
board_build.flash_mode = dio
board_build.f_cpu = 240000000
board_build.flash_size = 16MB
board_build.partitions = default_16MB.csv

; ── Real hardware env (flash MicroPython + upload .py files) ─────────
; Usage: pio run -e esp32-s3-upload -t deploypy
[env:esp32-s3-upload]
extends = env
extra_scripts = pre:tools/deploy_pio.py

; ── Wokwi env (frozen firmware) ──────────────────────────────────────
; `platformio run` builds build/frozen/firmware.bin through Docker.
[env:esp32-s3-wokwi]
extends = env
extra_scripts = pre:tools/pio_micro_build.py
board_build.firmware = build/frozen/firmware.bin
