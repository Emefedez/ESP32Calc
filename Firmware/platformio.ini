; ESP32Calc firmware blueprint.
; Target: ESP32-S3 N16R16, WeAct 2.13 inch B/W e-paper, SDSPI, matrix keyboard.

[platformio]
default_envs = esp32-s3-n16r16
src_dir = src

[env]
platform = espressif32
board = esp32-s3-devkitc-1
framework = espidf
monitor_speed = 115200
upload_speed = 921600
board_build.mcu = esp32s3
board_build.f_cpu = 240000000L
board_build.flash_mode = qio
board_build.flash_size = 16MB
board_build.psram = opi
board_upload.flash_size = 16MB
board_build.partitions = partitions.csv
build_unflags =
  -std=gnu++11
build_flags =
  -std=gnu++17
  -D ESP32CALC_DEBUG_LOGS=1
  -D ESP32CALC_EPD_FULL_REFRESH_INTERVAL=24
  ; -D ESP32CALC_BOOT_DISPLAY_TEST=1
  ; -D ESP32CALC_BOOT_NATIVE_TEST=1
  -D ESP32CALC_EPD_POWER_SETTLE_MS=250
monitor_filters =
  time
  esp32_exception_decoder

[env:esp32-s3-n16r16]
build_flags =
  ${env.build_flags}
  -D ESP32CALC_EPD_SPI_HZ=4000000

[env:esp32-s3-wokwi]
build_flags =
  ${env.build_flags}
  -D ESP32CALC_WOKWI=1
  -D ESP32CALC_EPD_SPI_HZ=4000000
