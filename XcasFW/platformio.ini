; ESP32Calc NeoCalculator-inspired firmware lab.
; Target: ESP32-S3 N16R16, ESP-IDF, 16 MB flash, 16 MB PSRAM.

[platformio]
default_envs = esp32-s3-n16r16, esp32-s3-wokwi
src_dir = src

[env]
platform = espressif32
board = esp32-s3-devkitc-1
framework = espidf
monitor_speed = 115200
upload_speed = 921600
board_build.mcu = esp32s3
board_build.f_cpu = 240000000L
board_build.flash_mode = qio
board_build.flash_size = 16MB
board_build.psram = opi
board_upload.flash_size = 16MB
board_build.partitions = partitions.csv
build_unflags =
  -std=gnu++11
build_flags =
  -std=gnu++17
  -D ESP32CALC_ALT_FIRMWARE=1
  -D ALT_FLASH_MB=16
  -D ALT_PSRAM_MB=16
  -D ESP32CALC_USE_GIAC=1
  -D ESP32CALC_GIAC_COMPILED=1
  -D ESP32CALC_EPD_FULL_REFRESH_INTERVAL=24
  -D ESP32CALC_EPD_POWER_SETTLE_MS=250
monitor_filters =
  time
  esp32_exception_decoder

[env:esp32-s3-n16r16]
build_flags =
  ${env.build_flags}
  -D ESP32CALC_EPD_SPI_HZ=4000000

[env:esp32-s3-wokwi]
board_build.f_flash = 40000000L
build_flags =
  ${env.build_flags}
  -D ESP32CALC_WOKWI=1
  -D ESP32CALC_EPD_SPI_HZ=4000000

[env:esp32-s3-wokwi-nogiac]
board_build.f_flash = 40000000L
build_flags =
  -std=gnu++17
  -D ESP32CALC_ALT_FIRMWARE=1
  -D ALT_FLASH_MB=16
  -D ALT_PSRAM_MB=16
  -D ESP32CALC_WOKWI=1
  -D ESP32CALC_USE_GIAC=0
  -D ESP32CALC_GIAC_COMPILED=0
  -D ESP32CALC_EPD_FULL_REFRESH_INTERVAL=24
  -D ESP32CALC_EPD_POWER_SETTLE_MS=250
  -D ESP32CALC_EPD_SPI_HZ=4000000
